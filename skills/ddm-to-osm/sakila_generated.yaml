kpis:
  actor_count:
    name: 演员信息表数量
    description: 统计演员信息表的数量
    host:
      entity: Actor
      cardinality: many
      grain: entity
    computation:
      type: aggregation
      base_model: actor
      measure: count
      aggregation: count
      filters: []
      joins: []
    time:
      dimension: last_update
      grain:
