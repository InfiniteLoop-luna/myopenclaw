governance:
  rules:
  - id: require_time_dimension
    condition: kpi.time.dimension is not None
    action: enforce_time_dimension
    description: 所有 KPI 必须指定时间维度
  policies:
    role_permissions:
      admin:
        allowed_kpis:
        - '*'
        allowed_entities:
        - '*'
      analyst:
        allowed_kpis:
        - actor_count
        - address_count
        - category_count
        - city_count
        - country_count
        - customer_count
        - film_count
        - film_actor_count
        - film_category_count
        - inventory_count
        - language_count
        - payment_count
        - rental_count
        - staff_count
        - store_count
        allowed_entities:
        - Actor
        - Address
        - Category
        - City
        - Country
        - Customer
        - Film
        - FilmActor
        - FilmCategory
        - FilmText
        - Inventory
        - Language
